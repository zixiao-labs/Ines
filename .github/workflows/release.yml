name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the release artifacts to"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p dist
          BIN="ines${{ matrix.ext }}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/zixiao-labs/ines/internal/buildinfo.Version=${VERSION}" \
            -o "dist/${BIN}" ./cmd/ines

      - name: Package artifact
        id: package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p out
          BASENAME="ines-${GOOS}-${GOARCH}"
          if [[ "${GOOS}" == "windows" ]]; then
            (cd dist && zip "../out/${BASENAME}.zip" "ines${{ matrix.ext }}")
            shasum -a 256 "out/${BASENAME}.zip" | awk '{print $1}' > "out/${BASENAME}.zip.sha256"
            echo "asset=out/${BASENAME}.zip" >> "$GITHUB_OUTPUT"
            echo "sum=out/${BASENAME}.zip.sha256" >> "$GITHUB_OUTPUT"
          else
            tar -C dist -czf "out/${BASENAME}.tar.gz" "ines${{ matrix.ext }}"
            shasum -a 256 "out/${BASENAME}.tar.gz" | awk '{print $1}' > "out/${BASENAME}.tar.gz.sha256"
            echo "asset=out/${BASENAME}.tar.gz" >> "$GITHUB_OUTPUT"
            echo "sum=out/${BASENAME}.tar.gz.sha256" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ines-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*

  publish:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ines-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
